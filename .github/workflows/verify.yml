name: verify

# Enforces the authoritative matrix (scripts/verify.py) in CI.
# It runs the verifier exactly as-is and nothing else, so CI scope == local scope.
# Ruff now gates the WHOLE repo, collab/ included: the "~321-finding debt" this comment
# used to cite as the reason for excluding it was measured on 2026-07-15 and found to be
# 5 findings, 4 of them autofixable. The verifier declares its remaining scope gaps in
# STANDING_OMISSIONS and refuses to print "full local matrix is green" while any exist.
# Still never invoked here: broker/integration tests, Playwright e2e.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync Python deps (installs Python 3.14 per pyproject)
        run: uv sync --all-groups

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dashboard deps
        run: pnpm --dir dashboard install --frozen-lockfile

      - name: Run authoritative verification matrix
        run: uv run --locked python scripts/verify.py
